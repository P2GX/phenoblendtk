<!-- Inside your UI library: shared-footer.component.html -->
<footer class="site-footer">
  <div class="footer-content">
    <p>&copy; {{ currentYear() }} {{ appName() }} v{{ appVersion() }}</p>
    
    <button 
      (click)="onHelpClick()"
      class="footer-link"
      title="Open help documentation"
    >
      <span>Help</span>
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    </button>

    <!-- The link now uses a reactive input bound to href -->
    <a
      [href]="sanitizedIssuesUrl()"
      target="_blank"
      rel="noopener noreferrer"
      class="footer-link"
      title="Report a bug or problem on GitHub"
    >
      <span>Report bug</span>
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 8l1.5-1.5M5 8L3.5 6.5M12 1v2M12 5a4 4 0 00-4 4v2H8 a4 4 0 008 0h0V9a4 4 0 00-4-4zM4 13h16M4 17h16M12 21v2" />
      </svg>
    </a>
  </div>
</footer>

<nav class="app-nav">
  @for (tab of tabs; track tab.path) {
    <a
      [routerLink]="tab.path"
      routerLinkActive="nav-link--active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="nav-link"
      (click)="logClick(tab.path)"
    >
      {{ tab.label }}
    </a>
  }
  <a
    [routerLink]="'/help'"
    routerLinkActive="nav-link--active"
    class="nav-link nav-link--help"
    (click)="logClick('/help')"
  >
    Help
  </a>
</nav>
